{% extends "base.html" %}
{% block title %}Customers{% endblock %}
{% block heading %}Customer Management{% endblock %}

{% block content %}
<div class="card-panel mb-4">
  <div class="panel-header"><h2><i class="bi bi-person-plus"></i> Add Customer</h2></div>
  <form method="post" action="{{ url_for('customer_add') }}" class="row g-3">
    <div class="col-md-5"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
    <div class="col-md-5"><label class="form-label">Phone</label><input name="phone" class="form-control" required></div>
    <div class="col-md-2 d-flex align-items-end"><button class="btn btn-accent w-100">Add</button></div>
  </form>
</div>

<div class="table-panel">
  <div class="p-3 pb-0">
    <div class="panel-header">
      <h2><i class="bi bi-people"></i> Customers ({{ customers|length }})</h2>
      <form class="d-flex" method="get">
        <input class="form-control form-control-sm" type="search" name="q" value="{{ search }}" placeholder="Search name or phone...">
      </form>
    </div>
  </div>
  <table class="table">
    <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th></th></tr></thead>
    <tbody>
      {% for c in customers %}
      <tr>
        <td>#{{ c[0] }}
          <form id="edit-c-{{ c[0] }}" method="post" action="{{ url_for('customer_edit', customer_id=c[0]) }}" class="d-none"></form>
        </td>
        <td><input form="edit-c-{{ c[0] }}" name="name" value="{{ c[1] }}" class="form-control form-control-sm bg-transparent border-0"></td>
        <td><input form="edit-c-{{ c[0] }}" name="phone" value="{{ c[2] }}" class="form-control form-control-sm bg-transparent border-0"></td>
        <td class="text-end">
          <button form="edit-c-{{ c[0] }}" class="btn btn-sm btn-outline-soft"><i class="bi bi-check2"></i></button>
          <a href="{{ url_for('customer_history', customer_id=c[0]) }}" class="btn btn-sm btn-outline-soft"><i class="bi bi-clock-history"></i></a>
          <form class="d-inline" method="post" action="{{ url_for('customer_delete', customer_id=c[0]) }}" onsubmit="return confirm('Delete this customer?');">
            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="text-center text-secondary py-4">No customers found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
